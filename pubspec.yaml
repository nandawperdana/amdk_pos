name: amdk_pos
description: POS, stok, kas, dan laporan untuk toko AMDK (air minum & galon).
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database lokal — sumber kebenaran, jalan penuh saat offline.
  drift: ^2.18.0
  drift_flutter: ^0.2.0     # helper setup SQLite native (Android/Windows/dll)

  # State management
  flutter_riverpod: ^2.5.1

  # Persist pilihan peran (kasir/owner) antar buka app.
  shared_preferences: ^2.2.3

  # Hash PIN lokal owner (jangan simpan plaintext).
  crypto: ^3.0.3

  # Sinkronisasi cloud (owner lihat laporan dari HP) — diaktifkan di Fase 2.
  supabase_flutter: ^2.5.6

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B5FA5"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
